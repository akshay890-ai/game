<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Runner Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #87CEEB;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0FFFF 100%);
            overflow: hidden;
        }

        #gameInfo {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            z-index: 100;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }

        #player {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E72);
            border-radius: 5px;
            z-index: 50;
        }

        .obstacle {
            position: absolute;
            width: 50px;
            height: 60px;
            background: linear-gradient(135deg, #8B4513, #A0522D);
            border-radius: 3px;
        }

        .wall {
            background: linear-gradient(135deg, #696969, #808080) !important;
        }

        .coin {
            position: absolute;
            width: 25px;
            height: 25px;
            background: radial-gradient(circle at 30% 30%, #FFFF00, #FFD700);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
            min-width: 300px;
        }

        #gameOver h1 {
            font-size: 40px;
            color: #FF6B6B;
            margin-bottom: 20px;
        }

        #gameOver p {
            font-size: 18px;
            margin: 15px 0;
        }

        #gameOver button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 16px;
            background: #00FF88;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #gameOver button:hover {
            background: #00DD77;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 50;
        }

        @media (max-width: 600px) {
            #gameInfo {
                font-size: 14px;
            }

            .info-box {
                padding: 8px 12px;
            }

            #player {
                width: 30px;
                height: 40px;
            }

            .obstacle {
                width: 40px;
                height: 50px;
            }

            #gameOver h1 {
                font-size: 30px;
            }

            #gameOver p {
                font-size: 14px;
            }

            #controls {
                font-size: 12px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameInfo">
            <div class="info-box">Score: <span id="score">0</span></div>
            <div class="info-box">Coins: <span id="coins">0</span></div>
            <div class="info-box">High: <span id="highScore">0</span></div>
        </div>

        <div id="player"></div>

        <div id="gameOver">
            <h1>GAME OVER!</h1>
            <p>Score: <span id="finalScore">0</span></p>
            <p>Coins: <span id="finalCoins">0</span></p>
            <button onclick="location.reload()">Play Again</button>
        </div>

        <div id="controls">
            ⬅️ LEFT ➡️ RIGHT | ⬆️ JUMP | ⬇️ SLIDE<br>
            Mobile: Swipe Left/Right/Up/Down
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const coinsDisplay = document.getElementById('coins');
        const highScoreDisplay = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const finalCoinsDisplay = document.getElementById('finalCoins');

        // Game settings
        const GAME_WIDTH = gameContainer.offsetWidth;
        const GAME_HEIGHT = gameContainer.offsetHeight;
        const LANES = [GAME_WIDTH * 0.25, GAME_WIDTH * 0.5, GAME_WIDTH * 0.75];
        const PLAYER_WIDTH = 40;
        const PLAYER_HEIGHT = 50;

        // Game state
        let gameState = {
            score: 0,
            coins: 0,
            highScore: localStorage.getItem('templeRunScore') || 0,
            currentLane: 1,
            isJumping: false,
            isSliding: false,
            gameActive: true,
            gameSpeed: 6,
            playerY: GAME_HEIGHT - 150,
            jumpVelocity: 0,
            spawnCounter: 0
        };

        highScoreDisplay.textContent = gameState.highScore;

        // Objects arrays
        let obstacles = [];
        let coins = [];

        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30) moveRight();
                else if (diffX < -30) moveLeft();
            } else {
                if (diffY > 30) jump();
                else if (diffY < -30) slide();
            }
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
            if (e.key === ' ' || e.key === 'ArrowUp') jump();
            if (e.key === 'ArrowDown' || e.key === 'Control') slide();
        });

        function moveLeft() {
            if (gameState.currentLane > 0 && gameState.gameActive) {
                gameState.currentLane--;
                player.style.left = LANES[gameState.currentLane] + 'px';
            }
        }

        function moveRight() {
            if (gameState.currentLane < 2 && gameState.gameActive) {
                gameState.currentLane++;
                player.style.left = LANES[gameState.currentLane] + 'px';
            }
        }

        function jump() {
            if (!gameState.isJumping && !gameState.isSliding && gameState.gameActive) {
                gameState.isJumping = true;
                gameState.jumpVelocity = 12;
            }
        }

        function slide() {
            if (!gameState.isSliding && !gameState.isJumping && gameState.gameActive) {
                gameState.isSliding = true;
                player.style.height = '25px';
                setTimeout(() => {
                    if (gameState.gameActive) {
                        player.style.height = '50px';
                        gameState.isSliding = false;
                    }
                }, 400);
            }
        }

        // Initialize player
        player.style.left = LANES[gameState.currentLane] + 'px';
        player.style.bottom = '120px';

        // Spawn obstacles
        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            const element = document.createElement('div');
            element.className = 'obstacle';
            if (Math.random() > 0.7) element.classList.add('wall');
            element.style.left = LANES[lane] + 'px';
            element.style.top = '-60px';
            gameContainer.appendChild(element);
            
            obstacles.push({
                element: element,
                x: LANES[lane],
                y: -60,
                lane: lane,
                width: 50,
                height: 60
            });
        }

        // Spawn coins
        function spawnCoin() {
            const lane = Math.floor(Math.random() * 3);
            const element = document.createElement('div');
            element.className = 'coin';
            element.style.left = LANES[lane] + 'px';
            element.style.top = '-30px';
            gameContainer.appendChild(element);
            
            coins.push({
                element: element,
                x: LANES[lane],
                y: -30,
                lane: lane,
                width: 25,
                height: 25,
                collected: false
            });
        }

        // Check collision
        function checkCollision(objX, objY, objWidth, objHeight) {
            const playerX = LANES[gameState.currentLane];
            const playerY = gameState.playerY;

            return (
                playerX < objX + objWidth &&
                playerX + PLAYER_WIDTH > objX &&
                playerY < objY + objHeight &&
                playerY + (gameState.isSliding ? 25 : 50) > objY
            );
        }

        // Game loop
        function gameLoop() {
            if (!gameState.gameActive) return;

            // Jump physics
            if (gameState.isJumping) {
                gameState.playerY -= gameState.jumpVelocity;
                gameState.jumpVelocity -= 0.6;

                if (gameState.playerY >= GAME_HEIGHT - 150) {
                    gameState.playerY = GAME_HEIGHT - 150;
                    gameState.isJumping = false;
                }

                player.style.bottom = (GAME_HEIGHT - gameState.playerY - PLAYER_HEIGHT) + 'px';
            }

            // Spawn obstacles
            gameState.spawnCounter++;
            if (gameState.spawnCounter > 50) {
                spawnObstacle();
                gameState.spawnCounter = 0;
            }

            // Randomly spawn coins
            if (Math.random() > 0.97) {
                spawnCoin();
            }

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.y += gameState.gameSpeed;
                obs.element.style.top = obs.y + 'px';

                // Check collision with player
                if (!gameState.isSliding && checkCollision(obs.x, obs.y, obs.width, obs.height)) {
                    endGame();
                }

                // Remove if off-screen
                if (obs.y > GAME_HEIGHT) {
                    obs.element.remove();
                    obstacles.splice(i, 1);
                    gameState.score += 10;
                    scoreDisplay.textContent = gameState.score;

                    // Increase difficulty
                    if (gameState.score % 100 === 0) {
                        gameState.gameSpeed += 1;
                    }
                }
            }

            // Update coins
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                coin.y += gameState.gameSpeed;
                coin.element.style.top = coin.y + 'px';

                // Check collision with player
                if (checkCollision(coin.x, coin.y, coin.width, coin.height) && !coin.collected) {
                    coin.collected = true;
                    coin.element.remove();
                    coins.splice(i, 1);
                    gameState.coins++;
                    gameState.score += 25;
                    coinsDisplay.textContent = gameState.coins;
                    scoreDisplay.textContent = gameState.score;
                }

                // Remove if off-screen
                if (coin.y > GAME_HEIGHT) {
                    coin.element.remove();
                    coins.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameState.gameActive = false;

            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('templeRunScore', gameState.highScore);
                highScoreDisplay.textContent = gameState.highScore;
            }

            finalScoreDisplay.textContent = gameState.score;
            finalCoinsDisplay.textContent = gameState.coins;
            gameOverScreen.style.display = 'block';
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
